### 持久化层（storage/database.py）

**设计原则：对标 COLMAP，使用单个 SQLite 文件（database.db）存储所有数据。**
数组和矩阵序列化为 BLOB（`array.tobytes()` 存储，`np.frombuffer()` 读取）。

```
database.db 表结构：
┌─────────────────────┬──────────────────────────────────────────────────┐
│ 表名                │ 存储内容                                          │
├─────────────────────┼──────────────────────────────────────────────────┤
│ cameras             │ camera_id, model, width, height,                 │
│                     │ focal_length_px, cx, cy, k1, k2                  │
├─────────────────────┼──────────────────────────────────────────────────┤
│ images              │ image_id, camera_id, image_path,                 │
│                     │ gps_lat, gps_lon, gps_alt,                       │
│                     │ yaw, pitch, roll, capture_time                   │
├─────────────────────┼──────────────────────────────────────────────────┤
│ keypoints           │ image_id, num_keypoints,                         │
│                     │ keypoints_xy(BLOB), scales(BLOB),                │
│                     │ orientations(BLOB), scores(BLOB)                 │
├─────────────────────┼──────────────────────────────────────────────────┤
│ descriptors         │ image_id, descriptors(BLOB)                      │
│                     │ （与keypoints分表，BA阶段可跳过加载）             │
├─────────────────────┼──────────────────────────────────────────────────┤
│ matches             │ pair_id(id1_id2), img_id1, img_id2,              │
│                     │ matches(BLOB), scores(BLOB)                      │
├─────────────────────┼──────────────────────────────────────────────────┤
│ two_view_geometries │ pair_id, img_id1, img_id2,                       │
│                     │ is_valid, model_type,                            │
│                     │ E_mat(BLOB), F_mat(BLOB), H_mat(BLOB),           │
│                     │ inlier_mask(BLOB), inlier_count, inlier_ratio,   │
│                     │ relative_R(BLOB), relative_t(BLOB),              │
│                     │ parallax_score                                   │
└─────────────────────┴──────────────────────────────────────────────────┘

索引：
- images(gps_lat, gps_lon)         → GPS范围查询
- images(camera_id)                → 相机模型分组
- matches(img_id1), matches(img_id2)
- two_view_geometries(is_valid)    → 快速获取有效对
```

**Database 类主要接口：**
```python
class Database:
    # 相机
    def save_camera(meta: ImageMeta) -> int          # 返回camera_id（自动去重）
    def load_camera(camera_id: int) -> dict

    # 图像元信息
    def save_image(meta: ImageMeta)
    def load_image_meta(image_id: int) -> ImageMeta
    def load_all_images() -> List[ImageMeta]
    def load_images_in_gps_bbox(...) -> List[int]

    # 特征点（keypoints与descriptors分开读写）
    def save_keypoints(data: FeatureData)            # 不含描述符
    def save_descriptors(image_id, descriptors)      # 单独保存
    def load_keypoints(image_id, load_desc=False) -> FeatureData

    # 匹配对
    def save_matches(data: MatchData)
    def load_matches(id1, id2) -> MatchData
    def load_all_pairs() -> List[Tuple[int,int]]

    # 几何验证
    def save_verification(result: VerificationResult)
    def load_verification(id1, id2) -> VerificationResult
    def load_valid_pairs() -> List[Tuple[int,int]]
```

