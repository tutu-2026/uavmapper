### 运行时重建状态（core/scene.py）

```python
# 仅存在于内存，不持久化到database.db
@dataclass
class Camera:
    image_id: int
    K: np.ndarray               # 3×3 相机内参矩阵
    R: np.ndarray               # 3×3 旋转矩阵（世界系 → 相机系）
    t: np.ndarray               # 3×1 平移向量
    gps_local_xyz: np.ndarray   # GPS转换后的局部ENU坐标（米）
    is_registered: bool

@dataclass
class Point3D:
    point_id: int
    xyz: np.ndarray             # 世界坐标系下的3D位置
    observations: Dict[int, int]  # {image_id: keypoint_index}
    is_outlier: bool

class SceneManager:
    cameras: Dict[int, Camera]
    points3d: Dict[int, Point3D]
    def get_covisibility(image_id) -> Dict[int, int]
    def get_points_observed_by(image_id) -> Dict[int, Point3D]
```

> **说明**：`SceneManager` 是增量SFM过程中的运行时状态，重建完成后通过 `io/colmap_io.py` 导出。`database.db` 存储的是特征处理阶段的原始数据，两者职责分离。

