### 集束调整（BA）分级策略

- **当前启用**：局部BA（`ba/local_ba.py`）
  - 滑动窗口：以最新注册帧为中心，选取共视最强的 **15帧**
  - 窗口外有观测的3D点设为 **constant 锚点**，防止漂移
  - 固定最老的2帧消除 **Gauge Freedom**
  - 求解器配置：`SPARSE_SCHUR` + Huber Loss + 最大50次迭代
  - 触发频率：每注册1帧触发一次
- **预留扩展**（取消 `pipeline._trigger_ba()` 中的注释即可启用）：
  - 中等BA：每20帧触发，优化窗口100帧
  - 全局BA：每100帧触发，优化所有帧 + GPS先验约束
  - GPS/RTK先验通过 `cost_functions.py` 中的 `GPSPositionCost` 实现

---

### 关键设计原则

1. **持久化层对标COLMAP**：单个 `database.db`（SQLite），数组序列化为BLOB，Python内置`sqlite3`无额外依赖
2. **descriptors 分表存储**：BA阶段只需特征点坐标，`load_keypoints(load_desc=False)` 跳过加载128维描述符，节省内存
3. **运行时状态与持久化分离**：`SceneManager`（内存）负责增量重建过程，`Database`（磁盘）负责特征数据，职责清晰
4. **`BundleAdjusterBase` 抽象基类**：统一 `optimize(scene, **kwargs) -> dict` 接口，切换BA策略只需改一行
5. **全部参数化**：所有超参数在 `config.py` 的 dataclass 中定义，代码中无魔法数字

