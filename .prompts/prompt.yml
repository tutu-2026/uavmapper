### 核心数据结构（core/data_models.py）

```python
@dataclass
class ImageMeta:
    image_id: int
    image_path: str
    width: int;  height: int
    focal_length_px: float;  cx: float;  cy: float
    k1: float;  k2: float
    camera_model: str;  camera_serial: str
    gps_lat: Optional[float];  gps_lon: Optional[float];  gps_alt: Optional[float]
    yaw: Optional[float];  pitch: Optional[float];  roll: Optional[float]
    capture_time: Optional[str]
    # 属性方法：K（3×3内参矩阵）、has_gps、has_pose

@dataclass
class FeatureData:
    image_id: int
    num_keypoints: int
    keypoints_xy: np.ndarray    # (N, 2) float32，像素坐标
    scales: np.ndarray          # (N,)   float32
    orientations: np.ndarray    # (N,)   float32，弧度
    scores: np.ndarray          # (N,)   float32
    descriptors: np.ndarray     # (N, 128) float32，RootSIFT描述符

@dataclass
class MatchData:
    img_id1: int;  img_id2: int     # 存储时保证 id1 < id2
    matches: np.ndarray             # (M, 2) int32，特征点索引对
    scores: np.ndarray              # (M,)   float32，匹配置信度

class GeometryModel(Enum):
    ESSENTIAL = "E";  FUNDAMENTAL = "F";  HOMOGRAPHY = "H";  UNKNOWN = "?"

@dataclass
class VerificationResult:
    img_id1: int;  img_id2: int
    is_valid: bool
    model_type: GeometryModel
    E_mat: Optional[np.ndarray]     # (3, 3) Essential Matrix
    F_mat: Optional[np.ndarray]     # (3, 3) Fundamental Matrix
    H_mat: Optional[np.ndarray]     # (3, 3) Homography Matrix
    inlier_mask: np.ndarray         # (M,) bool，对应 MatchData.matches
    inlier_count: int;  inlier_ratio: float
    relative_R: Optional[np.ndarray]  # (3, 3) 相对旋转（E矩阵分解）
    relative_t: Optional[np.ndarray]  # (3,)   相对平移（单位向量）
    parallax_score: float             # 用于初始对选择
```

